<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarly - Academic Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-color: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border-color: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(30, 41, 59, 0.3);
            --accent: #6366f1;
            --sidebar-bg: #0f172a;
        }

        .light-mode {
            --bg-color: #f8f9ff;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.05);
            --card-bg: #ffffff;
            --sidebar-bg: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden; 
            transition: all 0.3s ease;
        }
        
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--border-color); 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .active-tab { border-bottom: 2px solid var(--accent); color: var(--accent); }
        
        .dash-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        .dash-card:hover { transform: translateY(-2px); }

        .sidebar-item {
            transition: all 0.2s;
            border-radius: 12px;
            cursor: pointer;
        }
        .sidebar-item:hover { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
        
        #preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            padding: 1rem;
            align-items: center;
            justify-content: center;
        }

        .preview-container {
            background: white;
            width: 100%;
            max-width: 850px;
            height: 95vh;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .stat-bar {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        .stat-progress {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Preview Modal -->
    <div id="preview-modal" onclick="closePreview()">
        <div class="preview-container" onclick="event.stopPropagation()">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-white">
                <div class="flex items-center gap-2 text-slate-900">
                    <h3 class="font-bold text-sm" id="modal-title">Document Preview</h3>
                </div>
                <button onclick="closePreview()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-slate-200">Close</button>
            </div>
            <div id="modal-content" class="flex-1 overflow-y-auto p-8 bg-slate-50 text-slate-900 custom-scrollbar"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="glass border-b px-6 py-3 flex items-center justify-between shrink-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <h1 class="font-bold text-lg tracking-tight">Scholarly</h1>
        </div>
        
        <div class="flex items-center gap-8">
            <div class="flex gap-6 text-sm font-medium text-slate-400">
                <button onclick="switchTab('chat')" id="tab-chat" class="py-2">Chat</button>
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-2 active-tab">Dashboard</button>
                <button onclick="switchTab('blog')" id="tab-blog" class="py-2">Blog</button>
                <button onclick="switchTab('resources')" id="tab-resources" class="py-2">Resources</button>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-800/50 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-20 lg:w-64 border-r border-slate-800/50 p-6 flex flex-col gap-2 shrink-0" style="background: var(--sidebar-bg)">
            <div onclick="switchTab('dashboard')" class="sidebar-item p-3 flex items-center gap-3 text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span class="hidden lg:inline">Overview</span>
            </div>
        </aside>

        <div class="flex-1 overflow-y-auto custom-scrollbar bg-[var(--bg-color)]">
            <!-- DASHBOARD -->
            <div id="view-dashboard" class="p-8 space-y-8 max-w-[1400px] mx-auto">
                <h2 class="text-3xl font-bold">Campus Command Center 👋</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="dash-card p-6 rounded-3xl bg-indigo-600 text-white">
                        <p class="text-[10px] opacity-70 uppercase font-bold mb-1">Total Students</p>
                        <p class="text-3xl font-black">12,402</p>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div id="view-chat" class="hidden h-full flex flex-col p-4">
                <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"></div>
                <div class="p-4 glass rounded-2xl flex gap-2">
                    <input id="user-input" type="text" class="flex-1 bg-transparent border-none text-sm outline-none" placeholder="Ask anything...">
                    <button onclick="sendMessage()" class="bg-indigo-600 px-4 py-2 rounded-lg text-white font-bold">Send</button>
                </div>
            </div>

            <!-- BLOG -->
            <div id="view-blog" class="hidden p-8 max-w-6xl mx-auto space-y-8">
                <div id="blog-posts" class="grid grid-cols-1 gap-6"></div>
                <button onclick="generateBlogEntry()" class="bg-indigo-600 px-6 py-3 rounded-2xl text-xs font-bold">New Post</button>
            </div>

            <!-- RESOURCES -->
            <div id="view-resources" class="hidden p-8 max-w-6xl mx-auto space-y-8">
                <h2 class="text-2xl font-bold">Material Generator</h2>
                <input id="res-topic" type="text" placeholder="Topic..." class="w-full glass p-4 rounded-xl outline-none">
                <button onclick="generateResourceFromPrompt()" id="res-gen-btn" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Generate</button>
                <div id="generated-resources" class="grid grid-cols-3 gap-6"></div>
            </div>
        </div>
    </main>

    <script>
        // Clean API key assignment
        const apiKey = "AIzaSyADFsWRvnQziE4uJnI2C3wbKAGoRjyPsT0";
        let currentPdfData = { title: '', htmlContent: '' };

        function switchTab(tabId) {
            const tabs = ['chat', 'dashboard', 'resources', 'blog'];
            tabs.forEach(t => {
                const view = document.getElementById('view-' + t);
                const tab = document.getElementById('tab-' + t);
                if (t === tabId) {
                    view.classList.remove('hidden');
                    tab.classList.add('active-tab');
                } else {
                    view.classList.add('hidden');
                    tab.classList.remove('active-tab');
                }
            });
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        async function fetchGemini(prompt) {
            // Corrected endpoint for 2.5 flash preview
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ role: 'user', parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                })
            });
            
            if (!res.ok) {
                throw new Error('API request failed with status ' + res.status);
            }
            
            return await res.json();
        }

        function addMessage(text, sender) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'flex';
            if (sender === 'user') { div.classList.add('justify-end'); }
            div.innerHTML = `<div class="max-w-[80%] p-4 rounded-2xl text-sm ${sender === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-800'}">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = "";
            try {
                const result = await fetchGemini("Respond to this query: " + text + ". Return JSON format: {\"text\": \"your response here\"}");
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                addMessage(data.text, 'bot');
            } catch (e) { 
                addMessage("Error: " + e.message, 'bot'); 
            }
        }

        function previewPDF(title, htmlContent) {
            currentPdfData = { title, htmlContent };
            const modal = document.getElementById('preview-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = title;
            content.innerHTML = `<div style="padding: 40px; color: black; background: white;">${htmlContent}</div>`;
            modal.style.display = 'flex';
        }

        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

        async function generateBlogEntry() {
            try {
                const result = await fetchGemini(`Generate an academic blog post about Apple tech. JSON format: {"title": "...", "htmlContent": "...", "excerpt": "..."}`);
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                const post = document.createElement('div');
                post.className = "dash-card p-6 rounded-3xl cursor-pointer";
                post.innerHTML = `<h3 class="text-xl font-bold">${data.title}</h3><p class="text-sm opacity-70">${data.excerpt}</p>`;
                post.onclick = () => previewPDF(data.title, data.htmlContent);
                document.getElementById('blog-posts').prepend(post);
            } catch (e) { console.error(e); }
        }

        async function generateResourceFromPrompt() {
            const topic = document.getElementById('res-topic').value;
            if (!topic) return;
            try {
                const result = await fetchGemini(`Study guide for: ${topic}. JSON: {"title": "...", "htmlContent": "..."}`);
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                const card = document.createElement('div');
                card.className = "dash-card p-6 rounded-3xl cursor-pointer";
                card.innerHTML = `<b>${data.title}</b>`;
                card.onclick = () => previewPDF(data.title, data.htmlContent);
                document.getElementById('generated-resources').prepend(card);
            } catch (e) { console.error(e); }
        }

        window.onload = () => { /* Ready */ };
    </script>
</body>
</html>
