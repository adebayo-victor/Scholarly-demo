<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
}

/* Layout */
.app {
    display: flex;
    height: 100vh;
}

/* Sidebar */
aside {
    background: #0f172a;
    color: white;
    display: none;
    flex-direction: column;
}

@media (min-width: 768px) {
    aside {
        display: flex;
        width: 80px;
    }
}

@media (min-width: 1024px) {
    aside {
        width: 250px;
    }
}

/* Main */
main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Navbar */
nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    padding: 12px 16px;
    gap: 10px;
    border-bottom: 1px solid #ddd;
}

/* Content */
.content {
    padding: 16px;
}

@media (min-width: 768px) {
    .content {
        padding: 40px;
    }
}

/* Chat Input */
.chat-box {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

@media (min-width: 768px) {
    .chat-box {
        flex-direction: row;
    }
}

input, button {
    padding: 12px;
    font-size: 16px;
}

button {
    min-height: 44px;
}

/* Modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.preview-container {
    background: white;
    width: 100%;
    max-width: 1200px;
    height: 100%;
    max-height: 95vh;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

@media (min-width: 768px) {
    .preview-container {
        flex-direction: row;
    }
}

.sidebar-preview {
    width: 100%;
    border-bottom: 1px solid #ddd;
}

@media (min-width: 768px) {
    .sidebar-preview {
        width: 300px;
        border-right: 1px solid #ddd;
        border-bottom: none;
    }
}

</style>

</head>

<body>

<div class="app">

</div>

<!-- Modal -->

<div class="modal" id="modal">
    <div class="preview-container">
        <div class="sidebar-preview">Sidebar</div>
        <div style="flex:1; padding:20px;">Preview Area</div>
    </div>
</div>

<script>
    const apiKey = "AIzaSyADFsWRvnQziE4uJnI2C3wbKAGoRjyPsT0"; 
    let currentPdfStyle = 'academic';
    let currentPdfFont = 'sans';
    
    // Chat Memory State
    let conversationHistory = [];

    let blogData = [
        { id: 1, title: 'Generative AI in STEM', content: 'Recent studies suggest that LLM integration in physics classrooms has increased problem-solving efficiency by 40%. researchers are now focusing on mitigating hallucination rates in complex calculus operations.', category: 'TECH TRENDS', date: 'March 20, 2026' },
        { id: 2, title: 'Neuroplasticity & Deep Work', content: 'New neuroimaging results show that 90-minute "Deep Work" sessions significantly strengthen synaptic connections in the prefrontal cortex compared to fragmented study periods.', category: 'NEUROSCIENCE', date: 'March 19, 2026' },
        { id: 3, title: 'Sustainable Energy Breakthrough', content: 'Stanford engineers have prototyped a new perovskite solar cell with a record-breaking 31% efficiency. This could potentially reduce the cost of campus energy by half within the next decade.', category: 'ENGINEERING', date: 'March 18, 2026' }
    ];

    let flashcards = [
        { q: "What is neuroplasticity?", a: "The ability of the brain to form and reorganize synaptic connections, especially in response to learning or experience." },
        { q: "Define Heisenberg's Uncertainty Principle", a: "The principle that the position and the velocity of an object cannot both be measured exactly, at the same time." },
        { q: "What is the primary function of Mitochondria?", a: "To produce the energy currency of the cell, ATP, through respiration and to regulate cellular metabolism." }
    ];

    window.onload = function() { 
        renderBlog(); 
        renderFlashcards();
        addMessage("Systems online. Scholarly AI ready for synthesis. 🎓", 'bot');
    };

    function setPdfColor(hex) {
        document.documentElement.style.setProperty('--pdf-accent', hex);
        document.getElementById('pdf-color-picker').value = hex;
    }

    function updatePdfTheme() {
        const size = document.getElementById('pdf-font-range').value;
        document.getElementById('font-size-val').innerText = size;
        document.documentElement.style.setProperty('--pdf-font-size', size + 'px');
    }

    function setPdfStyle(style) {
        currentPdfStyle = style;
        const content = document.getElementById('modal-content');
        ['academic', 'modern', 'classic'].forEach(function(s) {
            content.classList.remove('pdf-style-' + s);
            const btn = document.getElementById('btn-' + s);
            if (s === style) {
                btn.className = "w-full text-left px-4 py-3 rounded-xl text-xs font-black bg-indigo-50 text-indigo-600 border border-indigo-200 shadow-sm";
                content.classList.add('pdf-style-' + s);
            } else {
                btn.className = "w-full text-left px-4 py-3 rounded-xl text-xs font-bold text-slate-500 hover:bg-white border border-transparent";
            }
        });
    }

    function setPdfFont(font) {
        currentPdfFont = font;
        const content = document.getElementById('modal-content');
        ['serif', 'sans', 'mono'].forEach(function(f) {
            content.classList.remove('pdf-font-' + f);
            const btn = document.getElementById('font-' + f);
            if (f === font) {
                btn.className = `px-3 py-2 bg-indigo-600 text-white rounded-lg text-xs font-${f}`;
                content.classList.add('pdf-font-' + f);
            } else {
                btn.className = `px-3 py-2 bg-white border rounded-lg text-xs font-${f} hover:border-indigo-400`;
            }
        });
    }

    function previewPDF(title, htmlContent) {
        const modal = document.getElementById('preview-modal');
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <div class="pdf-inner">
                <h1>${title}</h1>
                <div class="content-body">${htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div>
                <div style="margin-top: 80px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase;">
                    Synthesized via Scholarly Academic OS • ${new Date().toLocaleDateString()}
                </div>
            </div>
        `;
        setPdfStyle(currentPdfStyle);
        setPdfFont(currentPdfFont);
        modal.style.display = 'flex';
        document.getElementById('download-btn').onclick = function() {
            html2pdf().set({ margin: 1, filename: 'scholarly_synthesis.pdf', html2canvas: { scale: 2 } }).from(content).save();
        };
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    function switchTab(tabId) {
        ['chat', 'dashboard', 'resources', 'blog', 'flashcards'].forEach(function(t) {
            const view = document.getElementById('view-' + t);
            const btn = document.getElementById('tab-' + t);
            if (t === tabId) {
                view.classList.remove('hidden');
                btn.classList.add('active-tab');
            } else {
                view.classList.add('hidden');
                btn.classList.remove('active-tab');
            }
        });
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    async function fetchGeminiChat(userInput) {
        // Update history with user's new message
        conversationHistory.push({ role: 'user', parts: [{ text: userInput }] });
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: conversationHistory,
                systemInstruction: { parts: [{ text: "You are Scholarly AI, an academic support system. Respond concisely and academically. Maintain context of previous messages." }] }
            })
        });
        
        const data = await res.json();
        const botText = data.candidates[0].content.parts[0].text;
        
        // Add bot's response to history
        conversationHistory.push({ role: 'model', parts: [{ text: botText }] });
        
        // Limit memory to last 10 exchanges to prevent payload bloat
        if (conversationHistory.length > 20) {
            conversationHistory = conversationHistory.slice(-20);
        }
        
        return botText;
    }

    async function fetchGeminiResource(prompt, systemPrompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ role: 'user', parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            })
        });
        return await res.json();
    }

    async function generateResourceFromPrompt() {
        const topic = document.getElementById('res-topic').value;
        const style = document.getElementById('res-style').value;
        const btn = document.getElementById('res-gen-btn');
        if (!topic) return;
        btn.innerText = "Synthesizing..."; btn.disabled = true;
        try {
            const prompt = `Synthesize a comprehensive study guide for: ${topic}. Format style: ${style || 'Academic'}.`;
            const result = await fetchGeminiResource(prompt, "Academic Synthesis Engine.");
            const text = result.candidates[0].content.parts[0].text;
            const card = document.createElement('div');
            card.className = "dash-card p-8 rounded-[2.5rem] cursor-pointer border border-white/10";
            card.innerHTML = `<h4 class="font-black text-xl mb-2">${topic}</h4><p class="text-[10px] text-indigo-400 uppercase font-black tracking-widest bg-indigo-500/10 w-max px-3 py-1 rounded-lg">Verified Dossier</p>`;
            card.onclick = function() { previewPDF(topic, text); };
            document.getElementById('generated-resources').prepend(card);
        } finally { btn.innerText = "Synthesize"; btn.disabled = false; }
    }

    function addMessage(text, sender) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        if (sender === 'user') {
            div.className = 'flex justify-end';
        } else {
            div.className = 'flex justify-start';
        }
        div.innerHTML = `<div class="max-w-[85%] p-5 rounded-3xl text-sm ${sender === 'user' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'bg-slate-800 border border-white/5'}">${text.replace(/\n/g, '<br>')}</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = "";
        try {
            const botResponse = await fetchGeminiChat(text);
            addMessage(botResponse, 'bot');
        } catch (e) {
            addMessage("Synthesis interrupted. Please check connectivity.", 'bot');
        }
    }

    function renderBlog() {
        const container = document.getElementById('blog-posts');
        container.innerHTML = '';
        blogData.forEach(function(post) {
            const card = document.createElement('div');
            card.className = "dash-card p-8 rounded-[2.5rem] cursor-pointer group flex flex-col justify-between h-full";
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-black text-indigo-400 bg-indigo-500/10 px-3 py-1 rounded-lg tracking-widest">${post.category}</span>
                        <span class="text-[9px] font-bold text-slate-500">${post.date}</span>
                    </div>
                    <h3 class="font-black text-xl mb-4 group-hover:text-indigo-400 transition-colors">${post.title}</h3>
                    <p class="text-xs text-slate-400 line-clamp-3 leading-relaxed mb-6">${post.content}</p>
                </div>
                <div class="pt-4 border-t border-white/5 flex items-center justify-between text-[10px] font-black text-slate-500 uppercase">
                    <span>Read Full Report</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="group-hover:translate-x-1 transition-transform"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </div>
            `;
            card.onclick = function() { previewPDF(post.title, post.content); };
            container.appendChild(card);
        });
    }

    function renderFlashcards() {
        const container = document.getElementById('flashcard-grid');
        container.innerHTML = '';
        flashcards.forEach(function(card) {
            const el = document.createElement('div');
            el.className = "flashcard";
            el.innerHTML = `
                <div class="flashcard-inner" onclick="this.parentElement.classList.toggle('flipped')">
                    <div class="flashcard-front bg-slate-800 border border-white/5 flex flex-col gap-4">
                        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Question</span>
                        <p class="font-medium text-lg">${card.q}</p>
                    </div>
                    <div class="flashcard-back bg-indigo-600 text-white flex flex-col gap-4">
                         <span class="text-[10px] font-black text-indigo-200 uppercase tracking-widest">Answer</span>
                        <p class="font-medium text-lg">${card.a}</p>
                    </div>
                </div>
            `;
            container.appendChild(el);
        });
    }
</script>>
